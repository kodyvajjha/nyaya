name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.1.x"

      - run: opam install . --deps-only --with-test
        shell: bash

      - run: opam exec -- dune build
        shell: bash

      - run: opam exec -- dune build @runtest
        shell: bash
